<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Compactor - Simple URL shortener</title>

    <link href="css/style.css" rel="stylesheet">
    <script src="js/theme.js"></script>

    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-4 bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 font-sans">
    <!-- Theme Toggle -->
    <div class="fixed top-6 right-6">
        <button id="theme-toggle" class="p-3 rounded-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-md transition-all">
            <svg id="theme-toggle-light-icon" class="hidden h-5 w-5 text-yellow-500" fill="currentColor" viewBox="0 0 20 20">
                <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path>
            </svg>
            <svg id="theme-toggle-dark-icon" class="hidden h-5 w-5 text-slate-700" fill="currentColor" viewBox="0 0 20 20">
                <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
            </svg>
        </button>
    </div>

    <header class="w-full max-w-lg text-center mb-8" hx-ext="client-side-templates">
        <template id="version-template">
            {% if content.version %}<span class="text-xs font-mono bg-indigo-100 text-indigo-700 dark:bg-indigo-500/20 dark:text-indigo-300 px-2 py-1 rounded-full ml-2">v{{content.version}}</span>{% endif %}
        </template>
        <div hx-get="/app/version" hx-trigger="load" hx-target="#app-version" nunjucks-template="version-template"></div>
        <h1 class="text-5xl font-black tracking-tight mb-2">Compactor<span id="app-version"></span></h1>
        <p class="text-slate-500 dark:text-slate-400">Shorten, send, and track your links.</p>
    </header>

    <main class="w-full max-w-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-8 rounded-[2.5rem] shadow-2xl shadow-slate-200/50 dark:shadow-none" hx-ext="client-side-templates">
        <!-- Updated Result Template with Share Button -->
        <template id="short-template">
            <div class="mt-8 p-5 bg-indigo-50 dark:bg-slate-800/50 rounded-2xl border border-indigo-200 dark:border-indigo-500/30 flex flex-col sm:flex-row items-center justify-between gap-4 animate-in fade-in slide-in-from-bottom-2 duration-500">
                <div class="overflow-hidden w-full text-center sm:text-left">
                    <p class="text-[10px] uppercase tracking-widest font-bold text-indigo-600 dark:text-indigo-400 mb-1">Your new link</p>
                    <a id="link" href="/{{content.short}}" class="text-indigo-700 dark:text-indigo-300 font-bold hover:underline truncate block text-lg">
                        <span id="origin"><script>getOrigin('origin')</script></span>/{{content.short}}
                    </a>
                </div>
                <div class="flex gap-2 shrink-0">
                    <button type="button" onclick="copy()" class="bg-white dark:bg-slate-700 text-slate-700 dark:text-white border border-slate-200 dark:border-slate-600 px-4 py-2.5 rounded-xl text-sm font-bold transition-all active:scale-95">
                        Copy
                    </button>
                    <!-- THE SEND (SHARE) BUTTON -->
                    <button type="button" onclick="shareLink('/{{content.short}}')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-indigo-200 dark:shadow-none transition-all active:scale-95 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                        </svg>
                        Send
                    </button>
                </div>
            </div>
        </template>

        <form id="compactor-form"
              hx-get="/short"
              hx-target="#search-result"
              nunjucks-template="short-template"
              hx-on::before-request="clear('search-result')"
              class="space-y-5"
        >
            <div class="relative group">
                <input id="url-input" type="text" name="url" placeholder="Paste link here..." oninput="this.setCustomValidity('')" hx-on:htmx:validation:validate="validate(this)"
                       class="w-full bg-slate-100 dark:bg-slate-950 border-2 border-transparent focus:border-indigo-500 text-slate-900 dark:text-white rounded-2xl px-6 py-5 outline-none transition-all pr-14"
                >
                <button type="reset" class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
            </div>
            
            <button type="submit" class="w-full bg-slate-900 dark:bg-indigo-600 hover:bg-black dark:hover:bg-indigo-500 text-white font-black py-5 rounded-2xl transition-all shadow-xl shadow-slate-200 dark:shadow-indigo-900/20 active:scale-[0.98] text-lg flex items-center justify-center gap-3">
                Shorten URL
                <!-- Paper plane icon for "Send" feeling -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 paper-plane transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>
            </button>
        </form>

        <div id="search-result"></div>
        <div id="error" class="mt-6 p-4 bg-red-50 dark:bg-red-500/10 border border-red-200 text-red-600 dark:text-red-400 text-sm rounded-xl text-center hidden"></div>
    </main>

    <footer class="mt-12 text-center text-slate-400 text-sm">
        <p class="text-slate-400 text-xs uppercase tracking-widest font-semibold">&copy;
            <span id="copyright"><script>document.write(new Date().getFullYear())</script></span> oncook.top infrastructure
            <a href="https://github.com/streamdp" target="_blank">(view source code)</a>
        </p>
    </footer>

    <!-- Scripts -->
    <script src="js/htmx.min.js"></script>
    <script src="js/client-side-templates.js"></script>
    <script src="js/nunjucks.min.js"></script>
    <script src="js/error.js"></script>
    <script src="js/url.js"></script>
    <script src="js/utility.js"></script>
</body>
</html>
