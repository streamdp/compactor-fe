<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compactor - Simple URL Shortener</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
</head>

<body class="body">
    <header class="header" hx-ext="client-side-templates">
        <template id="version-template">
            {% if content.version %}
            <span class="version-badge">{{content.version}}</span>
            {% endif %}
        </template>
        <div hx-get="/app/version"
             hx-trigger="load"
             hx-target="#app-version"
             nunjucks-template="version-template"
        >
        </div>
        <h1 class="title">Compactor <span id="app-version"></span></h1>
        <p class="subtitle">Shorten and send your links</p>
    </header>

    <main class="main-card" hx-ext="client-side-templates">
        <template id="short-template">
            <div class="short-result">
                <div id="status-message" class="status-message hidden"></div>
                <div class="link-container">
                    <div class="link-text">
                        <p class="label">Your new link</p>
                        <a id="link" href="/{{content.short}}" class="short-link">
                            <span id="origin"><script>getOrigin('origin')</script></span>/{{content.short}}
                        </a>
                    </div>

                    <div class="link-actions">
                        <button type="button" onclick="copy()" class="btn-copy">Copy</button>
                        <button type="button" onclick="shareLink('/{{content.short}}')" class="btn-share">
                            <svg xmlns="http://www.w3.org/2000/svg" class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                            </svg>
                            Send
                        </button>
                    </div>
                </div>
            </div>
        </template>

        <form id="compactor-form"
              hx-get="/short"
              hx-target="#search-result"
              nunjucks-template="short-template"
              hx-on::before-request="clear('search-result')"
              class="form"
        >
            <div class="input-wrapper">
                <input id="url-input"
                       type="text"
                       name="url"
                       placeholder="Paste link here..."
                       oninput="this.setCustomValidity('')"
                       hx-on:htmx:validation:validate="validate(this)"
                       class="input"
                >
                <button type="reset" class="input-reset">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon-reset" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
            </div>

            <button type="submit" class="btn-submit">Shorten URL
                <svg xmlns="http://www.w3.org/2000/svg" class="icon-send" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                </svg>
            </button>
        </form>

        <div id="search-result"></div>
        <div id="error" class="error-message hidden"></div>
    </main>

    <footer class="footer">
        <p>&copy; <span id="copyright"><script>document.write(new Date().getFullYear())</script></span>
            oncook.top infrastructure <a href="https://github.com/streamdp" target="_blank">(view source code)</a>
        </p>
    </footer>

    <script src="js/htmx.min.js"></script>
    <script src="js/client-side-templates.js"></script>
    <script src="js/nunjucks.min.js"></script>
    <script src="js/error.js"></script>
    <script src="js/url.js"></script>
</body>
</html>
