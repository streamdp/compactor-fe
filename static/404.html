<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 - Page Not Found | Compactor - Simple URL shortener</title>

    <link href="css/style.css" rel="stylesheet">

    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
</head>

<body class="body">
    <main class="error-main">
        <div class="error-icon">
            <svg xmlns="http://www.w3.org/2000/svg" class="error-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>

        <h1 class="error-code">404</h1>
        <h2 class="error-title">Lost in space?</h2>
        <p class="error-message">
            The page you're looking for doesn't exist or has been moved to a shorter URL.
        </p>

        <a href="/" class="back-link">
            <svg xmlns="http://www.w3.org/2000/svg" class="icon-arrow" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Back to Home
        </a>
    </main>

    <footer class="footer">
        <p>&copy; <span id="copyright"><script>document.write(new Date().getFullYear())</script></span>
            oncook.top infrastructure <a href="https://github.com/streamdp" target="_blank">(view source code)</a>
        </p>
    </footer>
</body>
</html>
