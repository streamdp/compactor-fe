<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 - Page Not Found | Compactor - Simple URL shortener</title>

    <link href="css/style.css" rel="stylesheet">

    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
</head>

<body class="body">
    <header class="header" hx-ext="client-side-templates">
        <template id="version-template">
            {% if content.version %}
            <span class="version-badge">{{content.version}}</span>
            {% endif %}
        </template>
        <div hx-get="/app/version"
             hx-trigger="load"
             hx-target="#app-version"
             nunjucks-template="version-template"
        >
        </div>
        <h1 class="title">Compactor <span id="app-version"></span></h1>
        <p class="subtitle">Shorten and send your links</p>
    </header>

    <main class="error-main">
        <h1 class="error-code">404</h1>
        <h2 class="error-title">Lost in space?</h2>
        <p class="error-message">
            The page you're looking for doesn't exist or has been moved to a shorter URL.
        </p>

        <a href="/" class="back-link">
            <svg xmlns="http://www.w3.org/2000/svg" class="icon-arrow" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Back to Home
        </a>
    </main>

    <footer class="footer">
        <p>&copy; <span id="copyright"><script>document.write(new Date().getFullYear())</script></span>
            oncook.top infrastructure <a href="https://github.com/streamdp" target="_blank">(view source code)</a>
        </p>
    </footer>

    <script src="js/htmx.min.js"></script>
    <script src="js/client-side-templates.js"></script>
    <script src="js/nunjucks.min.js"></script>
    <script src="js/error.js"></script>
</body>
</html>
