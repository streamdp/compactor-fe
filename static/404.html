<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 - Page Not Found | Compactor - Simple URL shortener</title>

    <!-- Tailwind & External CSS -->
    <link href="css/style.css" rel="stylesheet">
    <script src="js/theme.js"></script>

    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-4 bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 font-sans">
    <!-- Theme Toggle -->
    <div class="fixed top-6 right-6">
        <button id="theme-toggle" class="p-3 rounded-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-md transition-all">
            <svg id="theme-toggle-light-icon" class="hidden h-5 w-5 text-yellow-500" fill="currentColor" viewBox="0 0 20 20">
                <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path>
            </svg>
            <svg id="theme-toggle-dark-icon" class="hidden h-5 w-5 text-slate-700" fill="currentColor" viewBox="0 0 20 20">
                <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
            </svg>
        </button>
    </div>

    <main class="w-full max-w-md text-center animate-fade-up">
        <!-- 404 Graphic/Icon -->
        <div class="mb-8 inline-flex items-center justify-center w-24 h-24 rounded-full bg-indigo-100 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>

        <h1 class="text-7xl font-black tracking-tighter text-slate-900 dark:text-white mb-4">404</h1>
        <h2 class="text-2xl font-bold mb-4">Lost in space?</h2>
        <p class="text-slate-500 dark:text-slate-400 mb-8 px-6">
            The page you're looking for doesn't exist or has been moved to a shorter URL.
        </p>

        <!-- Back Home Button -->
        <a href="/" class="back-link inline-flex items-center gap-2 bg-slate-900 dark:bg-indigo-600 hover:bg-black dark:hover:bg-indigo-500 text-white font-black px-8 py-4 rounded-2xl transition-all shadow-xl shadow-slate-200 dark:shadow-indigo-900/20 active:scale-[0.98]">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Back to Home
        </a>
    </main>

    <footer class="mt-12 text-center text-slate-400 text-sm">
        <p class="text-slate-400 text-xs uppercase tracking-widest font-semibold">&copy;
            <span id="copyright"><script>document.write(new Date().getFullYear())</script></span> oncook.top infrastructure
            <a href="https://github.com/streamdp" target="_blank">(view source code)</a>
        </p>
    </footer>

    <script src="js/utility.js"></script>
</body>
</html>
